<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Calm Apartment — Rental-Friendly Organization</title>
<meta name="description" content="Home organization ideas for renters. No-damage solutions, small spaces, calm aesthetic.">
<style>
  :root {
    --soft-white: #F5EFE6;
    --warm-beige: #D6CFC4;
    --sage: #A8B5A0;
    --terracotta: #C28B7C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--soft-white);
    color: #3a3532;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  main {
    max-width: 640px;
    text-align: center;
  }
  .logo {
    width: 80px;
    height: 80px;
    margin: 0 auto 2rem;
    background: var(--sage);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 2rem;
    font-weight: 300;
  }
  h1 {
    font-size: 2.5rem;
    font-weight: 300;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
    color: #2a2522;
  }
  .tagline {
    color: var(--terracotta);
    font-size: 1.1rem;
    font-style: italic;
    margin-bottom: 2rem;
  }
  p {
    color: #5a504a;
    margin-bottom: 1rem;
  }
  .coming-soon {
    display: inline-block;
    background: var(--warm-beige);
    padding: 0.5rem 1.5rem;
    border-radius: 999px;
    font-size: 0.9rem;
    margin-top: 2rem;
    color: #3a3532;
  }
  footer {
    margin-top: 3rem;
    font-size: 0.85rem;
    color: #9a8f88;
  }
</style>
</head>
<body>
<main>
  <div class="logo">T</div>
  <h1>The Calm Apartment</h1>
  <p class="tagline">Rental-friendly organization · no drills, no damage</p>
  <p>Small-space solutions for renters who want a calm, organized home without losing the deposit.</p>
  <p>Coming soon — organized by April 2026.</p>
  <div class="coming-soon">🪴 Launching Summer 2026</div>
  <footer>© 2026 The Calm Apartment</footer>
</main>
</body>
</html>
